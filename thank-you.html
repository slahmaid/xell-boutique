<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تم استلام طلبك</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Cairo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(900px 380px at 15% -10%, rgba(220, 38, 38, 0.25), transparent 50%),
          radial-gradient(800px 300px at 85% 0%, rgba(37, 99, 235, 0.18), transparent 45%),
          #f6f7fb;
        color: #0f172a;
        padding: 24px 14px;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        width: 100%;
        max-width: 720px;
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 18px;
        box-shadow: 0 22px 60px rgba(15, 23, 42, 0.12);
        padding: 22px 16px;
        backdrop-filter: blur(10px);
      }

      .top {
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }

      .badge {
        width: 56px;
        height: 56px;
        border-radius: 16px;
        background: linear-gradient(135deg, #dc2626, #f97316);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 16px 30px rgba(220, 38, 38, 0.25);
        flex: 0 0 auto;
      }

      .title {
        font-size: 1.35rem;
        font-weight: 800;
        margin-top: 3px;
      }

      .subtitle {
        margin-top: 8px;
        color: #334155;
        line-height: 1.8;
        font-size: 0.98rem;
      }

      .details {
        margin-top: 16px;
        background: #0b1220;
        color: #e5e7eb;
        border-radius: 14px;
        padding: 14px;
        border: 1px solid rgba(148, 163, 184, 0.25);
      }

      .row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 8px 0;
        border-bottom: 1px dashed rgba(148, 163, 184, 0.25);
      }

      .row:last-child {
        border-bottom: none;
      }

      .k {
        opacity: 0.9;
      }

      .v {
        font-weight: 800;
        text-align: left;
      }

      .actions {
        margin-top: 16px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        appearance: none;
        border: none;
        border-radius: 999px;
        padding: 12px 16px;
        cursor: pointer;
        font-weight: 900;
        transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
        text-decoration: none;
        display: inline-block;
      }

      .btn-primary {
        background: #dc2626;
        color: #fff;
        box-shadow: 0 14px 28px rgba(220, 38, 38, 0.35);
      }

      .btn-primary:hover {
        transform: translateY(-1px);
        filter: brightness(1.03);
      }

      .btn-ghost {
        background: transparent;
        color: #0f172a;
        border: 1px solid rgba(15, 23, 42, 0.18);
        box-shadow: none;
      }

      .btn-ghost:hover {
        transform: translateY(-1px);
      }

      .fineprint {
        margin-top: 12px;
        color: #64748b;
        font-size: 0.9rem;
        line-height: 1.7;
      }

      .check {
        width: 26px;
        height: 26px;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <!-- Meta Pixel Code -->
    <script>
      !function(f,b,e,v,n,t,s)
      {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
      n.callMethod.apply(n,arguments):n.queue.push(arguments)};
      if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
      n.queue=[];t=b.createElement(e);t.async=!0;
      t.src=v;s=b.getElementsByTagName(e)[0];
      s.parentNode.insertBefore(t,s)}(window, document,'script',
      'https://connect.facebook.net/en_US/fbevents.js');
      fbq('init', '2142534082995548');
      fbq('track', 'PageView');
    </script>
    <noscript><img height="1" width="1" style="display:none"
      src="https://www.facebook.com/tr?id=2142534082995548&ev=PageView&noscript=1"
    /></noscript>
    <!-- End Meta Pixel Code -->
  </head>
  <body>
    <main class="card">
      <div class="top">
        <div class="badge" aria-hidden="true">
          <svg class="check" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M20 6L9 17L4 12"
              stroke="white"
              stroke-width="2.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>
        <div>
          <div class="title">تم استلام طلبك بنجاح</div>
          <div class="subtitle">شكراً لك! سنقوم بالتواصل معك قريباً لتأكيد الطلب ومعالجة التوصيل.</div>
        </div>
      </div>

      <div class="details">
        <div class="row">
          <span class="k">الاسم</span>
          <span class="v" id="fullName">—</span>
        </div>
        <div class="row">
          <span class="k">الهاتف</span>
          <span class="v" id="phone">—</span>
        </div>
        <div class="row">
          <span class="k">التاريخ</span>
          <span class="v" id="date">—</span>
        </div>
      </div>

      <div class="actions">
        <a class="btn btn-primary" href="index.html">العودة للصفحة الرئيسية</a>
        <button class="btn btn-ghost" type="button" onclick="window.print()">طباعة التأكيد</button>
      </div>

      <div class="fineprint">إذا لم يتم الاتصال خلال وقت قريب، أعد إرسال الطلب أو جرّب رقم آخر للتأكد من صحة الهاتف.</div>
    </main>

    <script>
      const params = new URLSearchParams(window.location.search);
      const fullName = params.get("name") || params.get("fullName") || "—";
      const phone = params.get("phone") || "—";
      const date = params.get("date") || "—";

      const elName = document.getElementById("fullName");
      const elPhone = document.getElementById("phone");
      const elDate = document.getElementById("date");

      if (elName) elName.textContent = fullName;
      if (elPhone) elPhone.textContent = phone;
      if (elDate) elDate.textContent = date;

      if (typeof fbq === "function") {
        fbq("track", "Purchase", {
          value: 799,
          currency: "MAD"
        });
      }
    </script>
  </body>
</html>
